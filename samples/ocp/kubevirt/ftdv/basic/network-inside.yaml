apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  namespace: ${NAMESPACE}
  name: ${NAME}-net-inside
spec:
  config: '{
            "cniVersion": "0.3.1",
            "name": "${NAME}-net-inside",
            "type": "macvlan",
            "master": "${MACVLAN_MASTER}",
            "mode": "bridge",
            "ipam": {
              "type": "static",
              "addresses": [
                {
                  "address": "${NET_INSIDE_BRIDGE_IP}/${NET_INSIDE_PREFIX}"
                }
              ]
            }
          }'
