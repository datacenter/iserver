apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetwork
metadata:
  name: ${NAME}-sriov-inside
  namespace: openshift-sriov-network-operator
spec:
  resourceName: ${SRIOV_PHY1A_INTERFACE_NAME}dpdk
  networkNamespace: ${NAMESPACE}
  vlan: ${SRIOV_INSIDE_VLAN}
  ipam: |-
    {
      "type": "static",
      "addresses": [
        {
          "address": "${SRIOV_INSIDE_IP}/${SRIOV_INSIDE_PREFIX}",
          "gateway": "${SRIOV_INSIDE_GATEWAY}"
        }
      ]
    }